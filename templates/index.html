<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity AI</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; }

        /* Sidebar */
        #sidebar { width: 260px; background: #171717; display: flex; flex-direction: column; padding: 16px; gap: 8px; }
        #sidebar-header { display: flex; align-items: center; gap: 10px; padding: 8px; }
        #sidebar-header h2 { font-size: 18px; color: #7c3aed; }
        #new-chat-btn { background: #7c3aed; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; width: 100%; }
        #new-chat-btn:hover { background: #6d28d9; }
        #chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .chat-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover { background: #222; }
        .chat-item.active { background: #2a2a2a; color: white; }
        #user-area { border-top: 1px solid #222; padding-top: 12px; display: flex; align-items: center; gap: 10px; }
        #user-photo { width: 32px; height: 32px; border-radius: 50%; }
        #user-name { font-size: 13px; flex: 1; }
        #logout-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 12px; }

        /* Login screen */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #login-box { background: #171717; padding: 40px; border-radius: 16px; text-align: center; width: 360px; }
        #login-box h1 { color: #7c3aed; font-size: 28px; margin-bottom: 8px; }
        #login-box p { color: #888; margin-bottom: 24px; }
        #google-signin { background: white; color: #333; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px; display: flex; align-items: center; gap: 10px; margin: 0 auto; }
        #google-signin:hover { background: #f0f0f0; }
        #google-signin img { width: 20px; }

        /* Main chat area */
        #main { flex: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 16px 24px; border-bottom: 1px solid #222; font-size: 16px; font-weight: 600; }
        #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; gap: 12px; max-width: 80%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
        .user .message-bubble { background: #7c3aed; }
        .ai .message-bubble { background: #1a1a1a; border: 1px solid #2a2a2a; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .user .avatar { background: #7c3aed; }
        .ai .avatar { background: #1a1a1a; border: 1px solid #2a2a2a; }
        #input-area { padding: 16px 24px; border-top: 1px solid #222; display: flex; gap: 10px; }
        #input { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; color: white; padding: 12px 16px; border-radius: 12px; font-size: 14px; outline: none; resize: none; }
        #input:focus { border-color: #7c3aed; }
        #send { background: #7c3aed; color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 14px; }
        #send:hover { background: #6d28d9; }
        #welcome { text-align: center; margin: auto; color: #444; }
        #welcome h2 { font-size: 24px; color: #7c3aed; margin-bottom: 8px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div id="login-box">
        <h1>♾️ Infinity AI</h1>
        <p>Sign in to start chatting</p>
        <button id="google-signin">
            <img src="https://www.google.com/favicon.ico" alt="Google">
            Sign in with Google
        </button>
    </div>
</div>

<div id="sidebar">
    <div id="sidebar-header">
        <h2>♾️ Infinity AI</h2>
    </div>
    <button id="new-chat-btn">+ New Chat</button>
    <div id="chat-list"></div>
    <div id="user-area">
        <img id="user-photo" src="" alt="User">
        <span id="user-name"></span>
        <button id="logout-btn">Sign out</button>
    </div>
</div>

<div id="main">
    <div id="chat-header">New Chat</div>
    <div id="messages">
        <div id="welcome">
            <h2>Welcome to Infinity AI</h2>
            <p>Start a new chat to begin</p>
        </div>
    </div>
    <div id="input-area">
        <textarea id="input" placeholder="Message Infinity AI..." rows="1"></textarea>
        <button id="send">Send</button>
    </div>
</div>

<script>
    // ── Replace with your Firebase config ────────────────────────────────────
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    // ─────────────────────────────────────────────────────────────────────────

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let currentChatId = null;

    // Sign in
    document.getElementById("google-signin").onclick = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    };

    // Auth state
    auth.onAuthStateChanged(async user => {
        if (user) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("user-name").textContent = user.displayName;
            document.getElementById("user-photo").src = user.photoURL;
            const token = await user.getIdToken();
            await fetch("/verify_token", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({token})
            });
            loadChats();
        } else {
            document.getElementById("login-screen").style.display = "flex";
        }
    });

    // Logout
    document.getElementById("logout-btn").onclick = async () => {
        await auth.signOut();
        await fetch("/logout", {method: "POST"});
        document.getElementById("chat-list").innerHTML = "";
        document.getElementById("messages").innerHTML = `<div id="welcome"><h2>Welcome to Infinity AI</h2><p>Start a new chat to begin</p></div>`;
    };

    // Load chats
    async function loadChats() {
        const res = await fetch("/get_chats");
        const data = await res.json();
        const list = document.getElementById("chat-list");
        list.innerHTML = "";
        data.chats.forEach(chat => {
            const div = document.createElement("div");
            div.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
            div.textContent = chat.title;
            div.onclick = () => loadChat(chat.id, chat.title);
            list.appendChild(div);
        });
    }

    // Load specific chat
    async function loadChat(chatId, title) {
        currentChatId = chatId;
        document.getElementById("chat-header").textContent = title;
        const res = await fetch(`/get_chat/${chatId}`);
        const data = await res.json();
        const messages = document.getElementById("messages");
        messages.innerHTML = "";
        data.messages.forEach(msg => addMessage(msg.content, msg.role === "user" ? "user" : "ai"));
        loadChats();
    }

    // New chat
    document.getElementById("new-chat-btn").onclick = async () => {
        const res = await fetch("/new_chat", {method: "POST"});
        const data = await res.json();
        currentChatId = data.chat_id;
        document.getElementById("chat-header").textContent = "New Chat";
        document.getElementById("messages").innerHTML = "";
    };

    // Add message to UI
    function addMessage(text, type) {
        const welcome = document.getElementById("welcome");
        if (welcome) welcome.remove();
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = `message ${type}`;
        div.innerHTML = `
            <div class="avatar">${type === "user" ? "👤" : "♾️"}</div>
            <div class="message-bubble">${text}</div>
        `;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    // Send message
    async function sendMessage() {
        const input = document.getElementById("input");
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        input.value = "";
        addMessage(text, "user");
        addMessage("Thinking...", "ai");
        const res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text, chat_id: currentChatId})
        });
        const data = await res.json();
        document.querySelector(".message.ai:last-child .message-bubble").textContent = data.response;
        loadChats();
    }

    document.getElementById("send").onclick = sendMessage;
    document.getElementById("input").addEventListener("keypress", e => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
</script>
</body>
</html>
